name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

# Permissions the GITHUB_TOKEN needs to enable + deploy Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one deploy at a time
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true   # turns Pages on automatically on first run

      - name: Upload site
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'          # static site lives at the repo root

      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
